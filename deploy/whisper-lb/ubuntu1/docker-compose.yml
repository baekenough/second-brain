# ubuntu1 — faster-whisper backend + Caddy round-robin LB
# Tailscale IP: ${NODE1_TAILSCALE_IP} (set per-host; see deploy/whisper-lb/README.md)
#
# Deploy:
#   scp deploy/whisper-lb/ubuntu1/docker-compose.yml ubuntu1:~/second-brain-whisper/docker-compose.yml
#   scp deploy/whisper-lb/ubuntu1/Caddyfile          ubuntu1:~/second-brain-whisper/Caddyfile
#   ssh ubuntu1 'cd ~/second-brain-whisper && docker compose up -d'
#
# Port bindings are scoped to the Tailscale IP only (issue #100: call data must
# stay private — never expose on LAN or public interface).
#
# NAT hairpin note: Caddy reaches the local backend via the compose service name
# "whisper:8000" rather than the host Tailscale IP (NODE1_TAILSCALE_IP:8771), because
# containers cannot hairpin through the host's external IP back to a sibling
# container. The remote backend (ubuntu2) is reached via its Tailscale IP.

services:
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: second-brain-whisper
    restart: unless-stopped
    environment:
      WHISPER__MODEL: Systran/faster-whisper-medium
      WHISPER__INFERENCE_DEVICE: cpu
      # int8: ~50% less memory than float32, faster on CPU; negligible accuracy delta.
      WHISPER__COMPUTE_TYPE: int8
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: "8000"
    volumes:
      # HuggingFace model cache — prevents re-download on container restart.
      - hf-cache:/root/.cache/huggingface
    ports:
      # Tailscale IP only — LAN/public not exposed.
      - "${NODE1_TAILSCALE_IP}:8771:8000"

  caddy:
    image: caddy:2-alpine
    container_name: second-brain-whisper-lb
    restart: unless-stopped
    depends_on:
      - whisper
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      # LB frontend — Tailscale IP only.
      - "${NODE1_TAILSCALE_IP}:8770:8770"

volumes:
  hf-cache:
  caddy-data:
  caddy-config:
