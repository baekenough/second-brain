apiVersion: batch/v1
kind: CronJob
metadata:
  name: eval-runner
  namespace: second-brain
  labels:
    app: eval-runner
spec:
  # 03:00 KST = 18:00 UTC (UTC+9)
  schedule: "0 18 * * *"
  timeZone: "Asia/Seoul"  # requires k8s 1.27+ / minikube with TZ support; falls back to schedule above
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      # Only retry on true regression (exit 1). exit 2 (reindex recommended)
      # is converted to exit 0 by the shell wrapper below, so backoffLimit
      # matters only for unexpected failures or real regressions.
      backoffLimit: 0
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: eval-runner
        spec:
          restartPolicy: Never
          initContainers:
            - name: wait-for-postgres
              image: busybox:1.36
              command: ['sh', '-c', 'until nc -z postgres 5432; do echo "waiting for postgres"; sleep 2; done']
          containers:
            - name: eval-runner
              image: second-brain:dev
              imagePullPolicy: IfNotPresent
              # Exit-code contract:
              #   0 — eval passed (no regression, no reindex signal)
              #   1 — regression detected → job FAILS (triggers k8s failure alert)
              #   2 — reindex recommended (eval binary already sent webhook alert)
              #         → treated as success so CronJob does not re-run or fire
              #           a redundant k8s failure notification
              command:
                - sh
                - -c
                - |
                  /app/eval --check-reindex
                  code=$?
                  if [ $code -eq 1 ]; then
                    exit 1
                  fi
                  exit 0
              env:
                # MIGRATIONS_DIR is already set in the configmap but we set it
                # explicitly here as well so the eval job is self-contained and
                # does not depend on configmap ordering.
                - name: MIGRATIONS_DIR
                  value: "/app/migrations"
              envFrom:
                - configMapRef:
                    name: second-brain-config
                - secretRef:
                    name: second-brain-secret
              volumeMounts:
                - name: cliproxy-auth
                  mountPath: /etc/cliproxy
                  readOnly: true
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
          volumes:
            - name: cliproxy-auth
              secret:
                secretName: cliproxy-auth
                optional: true
                items:
                  - key: auth.json
                    path: auth.json
