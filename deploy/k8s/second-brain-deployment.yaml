apiVersion: apps/v1
kind: Deployment
metadata:
  name: second-brain
  namespace: second-brain
  labels:
    app: second-brain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: second-brain
  template:
    metadata:
      labels:
        app: second-brain
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo "waiting for postgres"; sleep 2; done']
      containers:
        - name: second-brain
          image: second-brain:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: second-brain-config
            - secretRef:
                name: second-brain-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
