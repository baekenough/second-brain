apiVersion: apps/v1
kind: Deployment
metadata:
  name: second-brain
  namespace: second-brain
  labels:
    app: second-brain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: second-brain
  template:
    metadata:
      labels:
        app: second-brain
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo "waiting for postgres"; sleep 2; done']
      containers:
        - name: second-brain
          image: second-brain:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9200
          envFrom:
            - configMapRef:
                name: second-brain-config
            - secretRef:
                name: second-brain-secret
          volumeMounts:
            # drive: emptyDir by default (collector disabled via FILESYSTEM_ENABLED=false).
            # To activate Drive collection, replace the volume with a hostPath and set
            # FILESYSTEM_ENABLED=true — see docs/runbook-deploy.md for full instructions.
            - name: drive
              mountPath: /data/drive
              readOnly: true
            - name: cliproxy-auth
              mountPath: /etc/cliproxy
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 9200
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        # drive: defaults to emptyDir so kubectl apply succeeds on servers without
        # a Google Drive host mount. The filesystem collector is disabled via
        # FILESYSTEM_ENABLED=false, so an empty volume is safe.
        #
        # To enable Drive collection on a host that has /mnt/drive mounted:
        #   kubectl -n second-brain patch deployment/second-brain --type=json -p='[
        #     {"op":"replace","path":"/spec/template/spec/volumes/0",
        #      "value":{"name":"drive","hostPath":{"path":"/mnt/drive","type":"Directory"}}}]'
        #   kubectl -n second-brain set env deployment/second-brain FILESYSTEM_ENABLED=true
        #   kubectl -n second-brain rollout restart deployment/second-brain
        #
        # Full instructions: docs/runbook-deploy.md "Filesystem collector 활성화"
        - name: drive
          emptyDir: {}
        - name: cliproxy-auth
          secret:
            secretName: cliproxy-auth
            optional: true
            items:
              - key: auth.json
                path: auth.json
