apiVersion: apps/v1
kind: Deployment
metadata:
  name: second-brain
  namespace: second-brain
  labels:
    app: second-brain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: second-brain
  template:
    metadata:
      labels:
        app: second-brain
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo "waiting for postgres"; sleep 2; done']
      containers:
        - name: second-brain
          image: second-brain:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9200
          envFrom:
            - configMapRef:
                name: second-brain-config
            - secretRef:
                name: second-brain-secret
          volumeMounts:
            - name: drive
              mountPath: /data/drive
              readOnly: true
            - name: cliproxy-auth
              mountPath: /etc/cliproxy
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 9200
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: drive
          hostPath:
            # minikube mount으로 마운트된 경로 (minikube 내부)
            # minikube mount "/Users/sangyi/Google Drive/공유 드라이브/Vibers.AI:/mnt/drive" &
            path: /mnt/drive
            type: DirectoryOrCreate
        - name: cliproxy-auth
          secret:
            secretName: cliproxy-auth
            optional: true
            items:
              - key: auth.json
                path: auth.json
