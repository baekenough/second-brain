# EXAMPLE ONLY — DO NOT apply via kustomize.
# Real secrets are created from .env on the server:
#   kubectl -n second-brain create secret generic second-brain-secret \
#     --from-env-file=.env --dry-run=client -o yaml | kubectl apply -f -
#
# Out-of-band secrets (NOT managed here — inject via kubectl patch or external secrets):
#   API_KEY           — Bearer token for /api/v1/* auth. Generate via
#                       `openssl rand -hex 32` and inject at runtime.
#   EMBEDDING_API_KEY — leave unset to use CliProxy OAuth (auth.json mounted at /etc/cliproxy/).
#                       Set only if bypassing CliProxy with a real OpenAI API key.
#   SLACK_BOT_TOKEN   — xoxb-... token injected at runtime; managed out-of-band to survive apply.
#
#   kubectl patch secret second-brain-secret -n second-brain \
#     --type=merge -p '{"stringData":{"API_KEY":"...","EMBEDDING_API_KEY":"sk-...","SLACK_BOT_TOKEN":"xoxb-..."}}'
#
# kubectl apply uses declarative field merge: keys absent from this manifest are
# NOT removed from the live Secret, so runtime-patched values survive re-applies.
apiVersion: v1
kind: Secret
metadata:
  name: second-brain-secret
  namespace: second-brain
type: Opaque
stringData:
  DATABASE_URL: "postgres://brain:brain@postgres:5432/second_brain?sslmode=disable"
  POSTGRES_PASSWORD: "CHANGE_ME"
  GITHUB_TOKEN: "CHANGE_ME"
