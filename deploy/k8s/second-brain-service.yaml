apiVersion: v1
kind: Service
metadata:
  name: second-brain
  namespace: second-brain
  labels:
    app: second-brain
spec:
  # NodePort 30080 → container 8080. Cloudflared on the host routes
  # secondbrain.baekenough.com to http://localhost:30080.
  type: NodePort
  selector:
    app: second-brain
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
