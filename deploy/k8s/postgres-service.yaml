apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: second-brain
spec:
  # NodePort so laptop/ubuntu2 remote collectors can reach the DB over LAN.
  # Home-LAN-only; authentication is still enforced via POSTGRES_PASSWORD.
  type: NodePort
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30032
      protocol: TCP
