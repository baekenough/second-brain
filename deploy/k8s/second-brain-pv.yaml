apiVersion: v1
kind: PersistentVolume
metadata:
  name: second-brain-drive-pv
  # NOTE: PersistentVolume is cluster-scoped (no namespace field)
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    # minikube 내부 경로 — 호스트 Google Drive 폴더를 minikube mount로 연결 필요.
    # 실행 전 반드시:
    #   minikube mount "/Users/sangyi/Google Drive/공유 드라이브/Vibers.AI:/mnt/drive" &
    path: /mnt/drive
    type: DirectoryOrCreate
