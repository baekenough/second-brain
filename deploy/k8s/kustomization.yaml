apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: second-brain
resources:
  - namespace.yaml
  - postgres-statefulset.yaml
  - postgres-service.yaml
  # second-brain-pv.yaml is excluded by default — apply manually when Drive host mount is ready.
  # See docs/runbook-deploy.md "Filesystem collector 활성화" for instructions.
  - second-brain-configmap.yaml
  - second-brain-deployment.yaml
  - second-brain-service.yaml
  - second-brain-web-deployment.yaml
  - second-brain-web-service.yaml
  - eval-cronjob.yaml
