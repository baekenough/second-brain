# Real Secret manifest — values are placeholders. Real values are maintained
# out-of-band on ubuntu1 via:
#   kubectl -n second-brain patch secret second-brain-secret --type=merge \
#     -p '{"stringData":{"DATABASE_URL":"...","POSTGRES_PASSWORD":"...","API_KEY":"...","EMBEDDING_API_KEY":"..."}}'
#
# `kubectl apply` uses declarative field merge: keys absent from a re-apply are
# NOT removed from the live Secret, so patched values survive re-applies of this
# file. Committing placeholders here is safe — the deployed Secret retains the
# real credentials set via the patch above.
apiVersion: v1
kind: Secret
metadata:
  name: second-brain-secret
  namespace: second-brain
type: Opaque
stringData:
  DATABASE_URL: "postgres://brain:CHANGE_ME@postgres:5432/second_brain?sslmode=disable"
  POSTGRES_PASSWORD: "CHANGE_ME"
  API_KEY: "CHANGE_ME"
  EMBEDDING_API_KEY: ""
