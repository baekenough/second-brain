# =============================================================================
# second-brain — 로컬 풀스택 Compose (macOS arm64)
# =============================================================================
# 용도: 로컬 개발 / 검증. 프로덕션 k8s 와 무관.
# 사전 조건:
#   - .env.local 이 이 디렉토리에 존재해야 합니다.
#     (.env.local.example 을 복사해 OpenAI 키를 채우세요)
# 실행:
#   docker compose -f docker-compose.local.yml up -d --build
# 중지/정리:
#   docker compose -f docker-compose.local.yml down
#   docker compose -f docker-compose.local.yml down -v   # 볼륨 포함 삭제
# =============================================================================

name: second-brain-local

services:

  # ---------------------------------------------------------------------------
  # postgres — pgvector + pg_bigm 이 포함된 커스텀 PostgreSQL 16 이미지
  # ---------------------------------------------------------------------------
  postgres:
    build:
      context: deploy/postgres
    image: second-brain-postgres:local
    environment:
      POSTGRES_DB: second_brain
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: brain
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain -d second_brain"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # server — API 서버 (포트 8080). DB 마이그레이션을 직접 적용한다.
  # ---------------------------------------------------------------------------
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    image: second-brain-server:local
    ports:
      - "8081:8080"
    env_file:
      - .env.local
    volumes:
      - ${HOME}/.second-brain/stage/call:/data/call
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # collector — 소스 데이터 수집 데몬 (포트 없음).
  #   호스트의 SQLite 원본을 직접 ro 마운트한다. collector DSN 의 immutable=1
  #   이 WAL/-shm 보조파일 접근을 피하므로 VirtioFS readonly 충돌 없이
  #   호스트 원본의 변경을 매 사이클 반영하는 증분 수집이 가능하다.
  # ---------------------------------------------------------------------------
  collector:
    build:
      context: .
      dockerfile: Dockerfile
      target: collector
    image: second-brain-collector:local
    env_file:
      - .env.local
    environment:
      DIARIZATION_API_URL: "http://diarization:8001"
      DIARIZATION_ENABLED: "${DIARIZATION_ENABLED:-false}"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      whisper:
        condition: service_started
      diarization:
        condition: service_started
    volumes:
      - ${LLM_MEMORY_DB_HOST_PATH:-/Users/user/workspace/llm-memory/data/memory.sqlite}:/data/llm-memory.sqlite:ro
      - ${GMAIL_HOST_PATH:-/Users/user/workspace/private/secretary/gmail}:/data/gmail:ro
      - ${CALENDAR_HOST_PATH:-/Users/user/workspace/private/secretary/calendar}:/data/calendar:ro
      # OneDrive sms/call are copied to local staging by onedrive-bridge.sh
      # (launchd: com.user.secondbrain.onedrive-bridge, interval 600s)
      # to avoid VirtioFS resource-deadlock on on-demand cloud files.
      - ${HOME}/.second-brain/stage/sms:/data/sms:ro
      - ${HOME}/.second-brain/stage/call:/data/call:ro
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ollama — 로컬 LLM 서버 (내부 포트 11434).
  #   gemma3:12b-it-qat 모델을 사용한다. macOS arm64 CPU 전용 (느림).
  #   모델 파일은 named volume ollama_models 에 영속된다.
  #   첫 기동 후: docker exec second-brain-ollama ollama pull gemma3:12b-it-qat
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: second-brain-ollama
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    networks:
      - default

  # ---------------------------------------------------------------------------
  # diarization — pyannote.audio 기반 화자 분리 서버 (#111, 내부 포트 8001).
  #   엔드포인트: POST /diarize, GET /health
  #   HF_TOKEN: HuggingFace 토큰 (gated 모델 다운로드에 필수 — .env 또는 셸에 설정).
  #   DIARIZATION_DEVICE: cpu (macOS arm64 CPU 전용; 느림).
  #   collector 가 DIARIZATION_ENABLED=true 일 때 http://diarization:8001 로 호출.
  #   주의: pyannote/speaker-diarization-3.x 모델 사용 전 HuggingFace 모델 페이지에서
  #         약관 동의(gated-model acceptance) 필요.
  # ---------------------------------------------------------------------------
  diarization:
    build:
      context: ./deploy/diarization
      dockerfile: Dockerfile
    image: second-brain-diarization:local
    environment:
      # HF_TOKEN: required for first-time gated-model download; safe blank default
      # suppresses the "variable is not set" compose warning when token is absent.
      # Set HF_TOKEN in .env.local (see .env.local.example) or export it in your shell.
      HF_TOKEN: "${HF_TOKEN:-}"
      DIARIZATION_DEVICE: "cpu"
    restart: unless-stopped
    networks:
      - default

  # ---------------------------------------------------------------------------
  # whisper — OpenAI-호환 음성인식 서버 (내부 포트 8000).
  #   fedirz/faster-whisper-server:latest-cpu 사용.
  #   엔드포인트: POST /v1/audio/transcriptions (multipart: file/model/language)
  #   WHISPER__MODEL 로 모델 지정 (HuggingFace repo ID).
  # ---------------------------------------------------------------------------
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    environment:
      WHISPER__MODEL: Systran/faster-whisper-medium
      WHISPER__INFERENCE_DEVICE: cpu
      # Explicitly set int8 to prevent the float16→float32 auto-fallback warning
      # on Apple Silicon (arm64 CPU does not support efficient float16).
      # int8 is the recommended CTranslate2 quantization for CPU-only inference:
      # ~50% less memory than float32, faster decoding, negligible accuracy delta.
      WHISPER__COMPUTE_TYPE: int8
      UVICORN_HOST: "0.0.0.0"
      UVICORN_PORT: "8000"
    restart: unless-stopped
    networks:
      - default

  # ---------------------------------------------------------------------------
  # eval-runner — nightly eval 스케줄러 (포트 없음).
  #   매일 03:00 KST (TZ=Asia/Seoul) 에 /app/eval --check-reindex 를 실행한다.
  #   Exit-code 계약 (k8s eval-cronjob.yaml 과 동일):
  #     0 — eval 통과 (회귀 없음, reindex 불필요)
  #     1 — 회귀 감지 → 로그 기록 후 다음 사이클 대기 (컨테이너 종료 안 함)
  #     2 — reindex 권장 (eval 바이너리가 이미 웹훅 알림 발송) → 무시하고 계속
  #   supercronic 등 외부 의존성 없이 셸 루프로 self-contained 스케줄링.
  # ---------------------------------------------------------------------------
  eval-runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: eval
    image: second-brain-eval:local
    env_file:
      - .env.local
    environment:
      TZ: Asia/Seoul
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Dockerfile eval 스테이지에 ENTRYPOINT ["/app/eval"] 이 있어 command 가
    # eval 의 인수로 전달되면 /app/eval sh -c '...' 가 실행되어 즉시 exit → restart-loop.
    # /bin/sh 로 ENTRYPOINT 를 오버라이드하면 command 스크립트가 sh -c "<script>" 로 실행된다.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          now=$$(date +%s)
          target=$$(date -d "today 03:00" +%s 2>/dev/null || echo $$((now + 86400)))
          [ "$$target" -le "$$now" ] && target=$$(($$target + 86400))
          sleep_sec=$$(($$target - $$now))
          echo "[eval-runner] sleeping $${sleep_sec}s until next 03:00 KST"
          sleep "$$sleep_sec"
          echo "[eval-runner] starting /app/eval --check-reindex at $$(date '+%Y-%m-%d %H:%M:%S %Z')"
          /app/eval --check-reindex
          echo "[eval-runner] eval exited $$?"
        done

  # ---------------------------------------------------------------------------
  # mcp — MCP streamable HTTP 서버 (포트 8090).
  #   마이그레이션은 server 가 적용하므로, server 가 기동된 뒤 시작한다.
  #   (server 는 depends_on postgres healthy 로 마이그레이션 완료를 보장)
  # ---------------------------------------------------------------------------
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: mcp
    image: second-brain-mcp:local
    ports:
      - "8090:8090"
    env_file:
      - .env.local
    environment:
      MCP_BIND_ADDR: "0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_started
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # web — Next.js 프론트엔드 (포트 3000).
  #   server 가 기동된 뒤 시작한다.
  #   BRAIN_API_URL 로 내부 API 서버를 가리켜 ingest 프록시가 올바르게 포워딩된다.
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: second-brain-web:local
    ports:
      - "3000:3000"
    env_file:
      - web/.env.local
      - .env.local
    environment:
      BRAIN_API_URL: "http://server:8080"
      AUTH_TRUST_HOST: "true"
      AUTH_URL: "${AUTH_URL}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL}"
      NODE_ENV: "production"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    depends_on:
      server:
        condition: service_started
    restart: unless-stopped

# -----------------------------------------------------------------------------
# Named volumes
# -----------------------------------------------------------------------------
volumes:
  pgdata:
    # macOS arm64 에서 PostgreSQL 데이터 디렉토리를 호스트 bind-mount 하면
    # 파일시스템 권한 충돌이 발생할 수 있으므로 named volume 을 사용한다.
  ollama_models:
    # ollama 모델 파일 영속 볼륨. 컨테이너 재생성 시 재다운로드 방지.
