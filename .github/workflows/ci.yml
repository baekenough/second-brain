name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-lint-build-test:
    name: Go build + vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: go mod download
        run: go mod download
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test -race -count=1 ./...

  yaml-lint:
    name: k8s YAML + hygiene gates [1-6/6] (single source-of-truth)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Run scripts/ci-checks.sh
        run: bash scripts/ci-checks.sh

  compose-deploy-readiness:
    name: Compose deploy-readiness lint (#162)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Bare absolute host path guard (ci-checks.sh [6/6])
        run: bash scripts/ci-checks.sh
      - name: docker compose config validation
        run: |
          # Validate compose interpolation / syntax without requiring .env.local.
          # Strategy: capture stderr, strip expected "variable is not set" warnings,
          # then fail if any unexpected error output remains.
          # NOTE: --quiet suppresses the rendered YAML on stdout; we only care about
          # stderr (warnings/errors). Exit code of `docker compose config` itself is
          # the primary failure signal for true syntax/interpolation errors.
          set +e
          ERR_OUTPUT=$(docker compose -f docker-compose.local.yml config --quiet 2>&1 >/dev/null)
          CONFIG_EXIT=$?
          set -e
          # Filter out known acceptable warnings (unset optional vars like AUTH_URL)
          REAL_ERRORS=$(printf '%s\n' "$ERR_OUTPUT" \
            | grep -v "variable is not set" \
            | grep -v "The .* variable is not set" \
            | grep -v "^$" || true)
          if [ $CONFIG_EXIT -ne 0 ] || [ -n "$REAL_ERRORS" ]; then
            echo "::error::docker compose config failed or produced unexpected errors"
            printf '%s\n' "$ERR_OUTPUT"
            exit 1
          fi
          echo "OK: docker compose config clean"

  docker-build-multiarch:
    name: Docker multi-arch build (no-cache)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build (linux/amd64, linux/arm64) — no cache
        run: |
          docker buildx build \
            --no-cache \
            --platform linux/amd64,linux/arm64 \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}" \
            --tag second-brain:ci \
            .

  govulncheck:
    name: Go vulnerability check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  frontend-build:
    name: Next.js build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'
      - name: bun install
        run: bun install --frozen-lockfile
      - name: next build
        run: bun run build
