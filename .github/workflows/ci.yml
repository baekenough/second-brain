name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-lint-build-test:
    name: Go build + vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: go mod download
        run: go mod download
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test -race -count=1 ./...

  yaml-lint:
    name: k8s YAML + hygiene gates (single source-of-truth)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Run scripts/ci-checks.sh
        run: bash scripts/ci-checks.sh

  docker-build-multiarch:
    name: Docker multi-arch build (no-cache)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build (linux/amd64, linux/arm64) — no cache
        run: |
          docker buildx build \
            --no-cache \
            --platform linux/amd64,linux/arm64 \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}" \
            --tag second-brain:ci \
            .

  govulncheck:
    name: Go vulnerability check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  frontend-build:
    name: Next.js build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'
      - name: bun install
        run: bun install --frozen-lockfile
      - name: next build
        run: bun run build
