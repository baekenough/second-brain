services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: second_brain
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: brain
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain -d second_brain"]
      interval: 5s
      timeout: 5s
      retries: 10

  second-brain:
    build:
      context: .
      dockerfile: Dockerfile
    image: second-brain:dev
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9200:9200"
    environment:
      DATABASE_URL: postgres://brain:brain@postgres:5432/second_brain?sslmode=disable
      COLLECT_INTERVAL: 5m
    env_file:
      - .env
    volumes:
      - "/Users/sangyi/Google Drive/공유 드라이브/Vibers.AI:/data/drive:ro"
    restart: unless-stopped

volumes:
  pgdata:
