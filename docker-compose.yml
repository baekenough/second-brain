services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: second_brain
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: brain
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain -d second_brain"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://brain:brain@postgres:5432/second_brain?sslmode=disable
      PORT: "8080"
      MIGRATIONS_DIR: /app/migrations
    env_file:
      - .env
    restart: unless-stopped

  collector:
    build:
      context: .
      dockerfile: Dockerfile
      target: collector
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://brain:brain@postgres:5432/second_brain?sslmode=disable
      COLLECT_INTERVAL: 10m
      MIGRATIONS_DIR: /app/migrations
    env_file:
      - .env
    volumes:
      - "/Users/sangyi/Google Drive/공유 드라이브/Vibers.AI:/data/drive:ro"
    restart: unless-stopped

volumes:
  pgdata:
